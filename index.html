<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US Open 2026 — Draft Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #08180b;
      color: #e4f0e4;
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(160deg, #1b3d20 0%, #0d2410 100%);
      border-bottom: 3px solid #c9a84c;
      padding: 28px 20px 20px;
      text-align: center;
    }
    header .trophy { font-size: 2rem; margin-bottom: 6px; }
    header h1 {
      font-size: 1.9rem;
      color: #c9a84c;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    header .subtitle {
      color: #7aab7a;
      margin-top: 4px;
      font-size: 0.88rem;
      letter-spacing: 1px;
    }
    .round-badge {
      display: inline-block;
      background: #c9a84c;
      color: #0d2410;
      padding: 4px 18px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.78rem;
      margin-top: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* ── Layout ── */
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 16px 40px;
    }
    .section-title {
      color: #c9a84c;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e3e22;
    }
    .last-updated {
      text-align: right;
      color: #3d6b42;
      font-size: 0.75rem;
      margin-bottom: 20px;
    }

    /* ── Leaderboard ── */
    .leaderboard {
      background: #0c1f0f;
      border: 1px solid #1e3e22;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .leaderboard table { width: 100%; border-collapse: collapse; }
    .leaderboard thead tr { background: #162c1a; }
    .leaderboard th {
      padding: 12px 14px;
      color: #c9a84c;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-align: center;
      font-weight: normal;
    }
    .leaderboard th.left { text-align: left; }

    .leaderboard td {
      padding: 15px 14px;
      text-align: center;
      border-bottom: 1px solid #162c1a;
      font-size: 0.92rem;
      transition: background 0.15s;
    }
    .leaderboard td.left { text-align: left; }
    .leaderboard tbody tr:last-child td { border-bottom: none; }
    .leaderboard tbody tr:hover td { background: #111f13; }

    .rank-1 td { background: rgba(201,168,76,0.10); }
    .rank-2 td { background: rgba(192,192,192,0.06); }
    .rank-3 td { background: rgba(205,127,50,0.06); }
    .rank-1:hover td { background: rgba(201,168,76,0.16) !important; }

    .rank-num { font-weight: bold; width: 36px; }
    .rank-1 .rank-num { color: #c9a84c; }
    .rank-2 .rank-num { color: #b0b0b0; }
    .rank-3 .rank-num { color: #cd7f32; }

    .team-name { font-weight: bold; font-size: 1rem; }
    .td-total { font-weight: bold; font-size: 1.05rem; }

    /* ── Score colours ── */
    .under { color: #56c25a; }
    .over  { color: #f06060; }
    .even  { color: #e4f0e4; }
    .dash  { color: #2e5233; }

    /* ── Team Cards ── */
    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 16px;
    }
    .card {
      background: #0c1f0f;
      border: 1px solid #1e3e22;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .card-header {
      background: #162c1a;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e3e22;
    }
    .card-name { font-size: 1.05rem; font-weight: bold; color: #c9a84c; }
    .card-rank { font-size: 0.75rem; color: #7aab7a; }
    .card-total { font-size: 1.25rem; font-weight: bold; }

    .player-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 16px;
      border-bottom: 1px solid #0f1f12;
      gap: 8px;
    }
    .player-row:last-child { border-bottom: none; }
    .player-name { font-size: 0.87rem; color: #a8c8a8; flex: 1; }
    .round-pills { display: flex; gap: 5px; }
    .pill {
      width: 30px;
      text-align: center;
      font-size: 0.78rem;
      padding: 2px 0;
      border-radius: 4px;
      background: #08180b;
      border: 1px solid #1e3e22;
    }
    .player-total {
      font-weight: bold;
      font-size: 0.88rem;
      width: 38px;
      text-align: right;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px;
      color: #2e5233;
      font-size: 0.75rem;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      header h1 { font-size: 1.3rem; letter-spacing: 2px; }
      .leaderboard th, .leaderboard td { padding: 11px 8px; font-size: 0.8rem; }
      .teams-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="trophy">⛳</div>
  <h1>US Open 2026</h1>
  <div class="subtitle">The Boys' Draft Competition</div>
  <div class="round-badge" id="round-badge">Loading...</div>
</header>

<div class="container">
  <div class="last-updated" id="last-updated"></div>

  <div class="section-title">Team Leaderboard</div>
  <div class="leaderboard">
    <table>
      <thead>
        <tr>
          <th class="left">Pos</th>
          <th class="left">Team</th>
          <th>R1</th>
          <th>R2</th>
          <th>R3</th>
          <th>R4</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body"></tbody>
    </table>
  </div>

  <div class="section-title">Player Breakdown</div>
  <div class="teams-grid" id="teams-grid"></div>
</div>

<footer>Auto-refreshes every 5 minutes &nbsp;·&nbsp; Last manually updated by the commissioner</footer>

<script>
// ================================================================
//  UPDATE SCORES HERE
//  Format: [R1, R2, R3, R4]
//  Use negative numbers for under par  (e.g. -5)
//  Use positive numbers for over par   (e.g. +3 → just write 3)
//  Use 0 for even par
//  Use null if the round hasn't been played yet
// ================================================================

const CURRENT_ROUND = 0; // 0 = not started, 1–4 = in progress or complete

const TEAMS = {
  "Pete": [
    { name: "S. Scheffler",   r: [null, null, null, null] },
    { name: "P. Reed",        r: [null, null, null, null] },
    { name: "B. Koepka",      r: [null, null, null, null] },
    { name: "A. Fitzpatrick", r: [null, null, null, null] },
    { name: "H. Matsuyama",   r: [null, null, null, null] },
  ],
  "Buff": [
    { name: "J. Rahm",        r: [null, null, null, null] },
    { name: "R. Henley",      r: [null, null, null, null] },
    { name: "C. Morikawa",    r: [null, null, null, null] },
    { name: "J. Nieman",      r: [null, null, null, null] },
    { name: "B. Griffin",     r: [null, null, null, null] },
  ],
  "Heath": [
    { name: "M. Fitzpatrick", r: [null, null, null, null] },
    { name: "L. Aberg",       r: [null, null, null, null] },
    { name: "S. Burns",       r: [null, null, null, null] },
    { name: "V. Hovland",     r: [null, null, null, null] },
    { name: "R. McIntyre",    r: [null, null, null, null] },
  ],
  "Serge": [
    { name: "T. Fleetwood",   r: [null, null, null, null] },
    { name: "Si Woo Kim",     r: [null, null, null, null] },
    { name: "W. Clarke",      r: [null, null, null, null] },
    { name: "C. Gotterup",    r: [null, null, null, null] },
    { name: "P. Cantlay",     r: [null, null, null, null] },
  ],
  "Trav": [
    { name: "R. McIlroy",     r: [null, null, null, null] },
    { name: "T. Hatton",      r: [null, null, null, null] },
    { name: "Cam. Smith",     r: [null, null, null, null] },
    { name: "B. Dechambeau",  r: [null, null, null, null] },
    { name: "A. Scott",       r: [null, null, null, null] },
  ],
  "Mick": [
    { name: "C. Young",       r: [null, null, null, null] },
    { name: "X. Schauffele",  r: [null, null, null, null] },
    { name: "J. Thomas",      r: [null, null, null, null] },
    { name: "J. Rose",        r: [null, null, null, null] },
    { name: "M. McNealy",     r: [null, null, null, null] },
  ],
};

// ================================================================
//  RENDERING — no need to edit below this line
// ================================================================

function fmtScore(val) {
  if (val === null) return { text: "–", cls: "dash" };
  if (val === 0)   return { text: "E",  cls: "even" };
  if (val < 0)     return { text: val.toString(), cls: "under" };
  return { text: "+" + val, cls: "over" };
}

function playerTotal(player) {
  return player.r.reduce((sum, v) => v !== null ? sum + v : sum, 0);
}

function playerHasPlayed(player) {
  return player.r.some(v => v !== null);
}

function teamRoundTotal(players, roundIdx) {
  const scores = players.map(p => p.r[roundIdx]).filter(v => v !== null);
  if (scores.length === 0) return null;
  return scores.reduce((a, b) => a + b, 0);
}

function teamTotal(players) {
  return players
    .filter(playerHasPlayed)
    .reduce((sum, p) => sum + playerTotal(p), 0);
}

function hasAnyScore(players) {
  return players.some(playerHasPlayed);
}

function buildLeaderboard() {
  const entries = Object.entries(TEAMS).map(([name, players]) => ({
    name,
    players,
    rounds: [0,1,2,3].map(i => teamRoundTotal(players, i)),
    total: teamTotal(players),
    played: hasAnyScore(players),
  }));

  entries.sort((a, b) => {
    if (!a.played && !b.played) return 0;
    if (!a.played) return 1;
    if (!b.played) return -1;
    return a.total - b.total;
  });

  const tbody = document.getElementById("leaderboard-body");
  tbody.innerHTML = "";

  entries.forEach((e, i) => {
    const rank = i + 1;
    const tr = document.createElement("tr");
    if (rank <= 3 && e.played) tr.classList.add(`rank-${rank}`);

    const total = e.played ? fmtScore(e.total) : { text: "–", cls: "dash" };

    tr.innerHTML = `
      <td class="left rank-num">${e.played ? rank : "–"}</td>
      <td class="left team-name">${e.name}</td>
      ${e.rounds.map(v => { const s = fmtScore(v); return `<td class="${s.cls}">${s.text}</td>`; }).join("")}
      <td class="td-total ${total.cls}">${total.text}</td>
    `;
    tbody.appendChild(tr);
  });

  return entries;
}

function buildCards(entries) {
  const grid = document.getElementById("teams-grid");
  grid.innerHTML = "";

  entries.forEach((e, i) => {
    const rank = e.played ? `#${i + 1}` : "–";
    const totalFmt = e.played ? fmtScore(e.total) : { text: "–", cls: "dash" };

    const card = document.createElement("div");
    card.className = "card";

    const playerRows = e.players.map(p => {
      const tot = playerHasPlayed(p) ? fmtScore(playerTotal(p)) : { text: "–", cls: "dash" };
      const pills = p.r.map(v => {
        const s = fmtScore(v);
        return `<span class="pill ${s.cls}">${s.text}</span>`;
      }).join("");
      return `
        <div class="player-row">
          <span class="player-name">${p.name}</span>
          <div class="round-pills">${pills}</div>
          <span class="player-total ${tot.cls}">${tot.text}</span>
        </div>`;
    }).join("");

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-name">${e.name}</div>
          <div class="card-rank">Position: ${rank}</div>
        </div>
        <div class="card-total ${totalFmt.cls}">${totalFmt.text}</div>
      </div>
      ${playerRows}
    `;
    grid.appendChild(card);
  });
}

function roundLabel() {
  if (CURRENT_ROUND === 0) return "Tournament Not Started";
  if (CURRENT_ROUND === 4) return "Final Round";
  return `Round ${CURRENT_ROUND} In Progress`;
}

function render() {
  document.getElementById("round-badge").textContent = roundLabel();
  document.getElementById("last-updated").textContent =
    "Page loaded: " + new Date().toLocaleString("en-GB", { dateStyle: "medium", timeStyle: "short" });

  const entries = buildLeaderboard();
  buildCards(entries);
}

render();

// Auto-refresh every 5 minutes
setInterval(() => location.reload(), 5 * 60 * 1000);
</script>
</body>
</html>
